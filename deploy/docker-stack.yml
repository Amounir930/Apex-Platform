version: '3.8'

services:
  # --- INFRASTRUCTURE: API Gateway ---
  gateway:
    image: traefik:v3.1
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@kitvet.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - apex-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 1GB
        reservations:
          memory: 256MB

  # --- CORE DATABASES ---
  db:
    image: postgres:16-alpine
    networks:
      - apex-network
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: "unleash"
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2GB
        reservations:
          memory: 512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      start_period: 60s

  cache:
    image: redis:7-alpine
    networks:
      - apex-network
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512MB
        reservations:
          memory: 64MB
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      start_period: 30s

  # --- STORAGE & FEATURE MGMT ---
  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    networks:
      - apex-network
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1GB
        reservations:
          memory: 256MB
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      start_period: 60s

  unleash:
    image: unleashorg/unleash-server:latest
    entrypoint: ["sh", "-c", "export DATABASE_PASSWORD=$$(cat /run/secrets/db_password | tr -d '\\n\\r') && export DATABASE_URL=\"postgres://postgres:$$DATABASE_PASSWORD@db:5432/unleash?sslmode=disable\" && exec node index.js"]
    networks:
      - apex-network
    secrets:
      - db_password
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1GB
        reservations:
          memory: 256MB
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4242/health"]
      interval: 30s
      start_period: 90s

  # --- APP SERVICES ---
  api:
    image: traefik/whoami
    networks:
      - apex-network
    deploy:
      replicas: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`api.60sec.shop`) || Host(`api.kitvet.com`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls.certresolver=myresolver"
        - "traefik.http.services.api.loadbalancer.server.port=80"
      resources:
        limits:
          memory: 512MB
        reservations:
          memory: 128MB

  worker:
    image: traefik/whoami
    networks:
      - apex-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512MB
        reservations:
          memory: 128MB

  storefront:
    image: traefik/whoami
    networks:
      - apex-network
    deploy:
      replicas: 2
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.storefront.rule=Host(`60sec.shop`) || Host(`kitvet.com`) || Host(`localhost`)"
        - "traefik.http.routers.storefront.entrypoints=websecure"
        - "traefik.http.routers.storefront.tls.certresolver=myresolver"
        - "traefik.http.services.storefront.loadbalancer.server.port=80"
      resources:
        limits:
          memory: 512MB
        reservations:
          memory: 128MB

  # --- AI & VECTOR SEARCH ---
  qdrant:
    image: qdrant/qdrant:v1.10.1
    networks:
      - apex-network
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 2GB
        reservations:
          memory: 1GB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/readyz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --- OBSERVABILITY (SigNoz) ---
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    networks:
      - apex-network
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4GB
        reservations:
          memory: 2GB
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 20s
      start_period: 90s

  signoz-query-service:
    image: signoz/query-service:0.45.0
    # Ensuring directory exists and has correct permissions
    entrypoint: ["sh", "-c", "mkdir -p /var/lib/signoz && chmod 777 /var/lib/signoz && exec ./query-service"]
    networks:
      - apex-network
    environment:
      STORAGE_TYPE: "clickhouse"
      CLICKHOUSE_URL: "tcp://signoz-clickhouse:9000"
      JWT_SECRET: "apex_jwt_secret_2026"
      SIGNOZ_LOCAL_DB_PATH: "/var/lib/signoz/signoz.db"
    volumes:
      - signoz_db:/var/lib/signoz
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 2GB
        reservations:
          memory: 512MB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 20s
      start_period: 90s

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.102.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    networks:
      - apex-network
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1GB
        reservations:
          memory: 256MB

  signoz-frontend:
    image: signoz/frontend:0.45.0
    networks:
      - apex-network
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512MB
        reservations:
          memory: 128MB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3301 || exit 1"]
      interval: 20s
      start_period: 60s

networks:
  apex-network:
    driver: overlay
    driver_opts:
      encrypted: "true"

volumes:
  db_data:
  qdrant_data:
  clickhouse_data:
  minio_data:
  letsencrypt:
  signoz_db:

secrets:
  db_password:
    external: true
  minio_root_user:
    external: true
  minio_root_password:
    external: true
